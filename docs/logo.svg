<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 130">
  <!-- Background -->
  <rect width="640" height="130" rx="10" fill="#0d1117"/>
  <!-- Top red bar -->
  <rect x="0" y="0" width="640" height="3" fill="#E31837"/>
  <!-- COSTCO -->
  <text x="320" y="72" text-anchor="middle" font-family="Impact,'Arial Black','Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="72" fill="#E31837" letter-spacing="2">COSTCO</text>
  <!-- Blue bar -->
  <rect x="100" y="82" width="440" height="3" rx="1.5" fill="#005DAA"/>
  <!-- WHOLESALE -->
  <text x="240" y="102" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="14" fill="#005DAA" letter-spacing="3">WHOLESALE</text>
  <!-- RECEIPTS -->
  <text x="400" y="102" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="600" font-size="14" fill="#005DAA" letter-spacing="3">RECEIPTS</text>
  <!-- Bottom blue bar -->
  <rect x="0" y="127" width="640" height="3" fill="#005DAA"/>
</svg>
